name: Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install root dependencies
        run: npm install

      - name: Install server dependencies
        run: npm install
        working-directory: server

      - name: Install client dependencies
        run: npm install
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client

      - name: Build server
        run: npm run build
        working-directory: server

      - name: Compile plugin entry
        run: npx esbuild plugin/index.ts --bundle=false --format=esm --platform=node --outfile=plugin/index.js

      - name: Prepare release directory
        run: |
          mkdir -p release-out/server/dist/server/src
          mkdir -p release-out/client

          # Root package.json, compiled standard plugin entry, and TUI plugin source
          cp plugin/package.json release-out/package.json
          cp plugin/index.js release-out/index.js
          cp plugin/tui.tsx release-out/tui.tsx

          # Compiled server output (from tsc build)
          cp -r server/dist/* release-out/server/dist/
          echo '{"type":"commonjs"}' > release-out/server/package.json

          # Compiled client — server resolves: __dirname (server/dist/server/src) + ../../../../client/dist
          cp -r client/dist release-out/client/dist

      - name: Push to release branch
        run: |
          cd release-out
          # Ensure node_modules are committed (users must not need to run npm install)
          echo "" > .gitignore
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/igorvelho/opencode-dashboard.git
          git checkout -b release
          git add -A
          git commit -m "release: ${{ github.ref_name }}"
          git push --force origin release
