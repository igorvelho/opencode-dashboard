name: Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Install server dependencies
        run: npm install
        working-directory: server

      - name: Install client dependencies
        run: npm install
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client

      - name: Build server
        run: npm run build
        working-directory: server

      - name: Prepare release directory
        run: |
          mkdir -p release-out/server
          mkdir -p release-out/client

          # Root package.json — this IS the npm package OpenCode installs.
          # tui.tsx lives at the root so the ./tui export resolves correctly.
          cp plugin/package.json release-out/package.json
          cp plugin/tui.tsx release-out/tui.tsx

          # Compiled server output
          cp -r server/dist release-out/server/dist
          cp server/package.json release-out/server/
          cp server/package-lock.json release-out/server/

          # Compiled client — server resolves: __dirname (server/dist) + ../../client/dist
          cp -r client/dist release-out/client/dist

          # Shared types (compiled away in server/dist, but keep for reference)
          cp -r shared release-out/shared

      - name: Install server production dependencies
        run: npm ci --omit=dev
        working-directory: release-out/server

      - name: Push to release branch
        run: |
          cd release-out
          # Ensure node_modules are committed (users must not need to run npm install)
          echo "" > .gitignore
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/igorvelho/opencode-dashboard.git
          git checkout -b release
          git add -A
          git commit -m "release: ${{ github.ref_name }}"
          git push --force origin release
