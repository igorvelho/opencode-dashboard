name: Build and Deploy to Release Branch

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # ── Install dependencies ──────────────────────────────────
      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      # ── Build ──────────────────────────────────────
      - name: Build client and server
        run: npm run build

      - name: Bundle server
        run: |
          cd server
          npx -y esbuild src/index.ts \
            --bundle \
            --platform=node \
            --format=cjs \
            --outfile=dist/bundle/index.js \
            --main-fields=main,module \
            --external:sql.js \
            --minify

      # ── Assemble release ──────────────────────────────────────
      - name: Create release directory
        run: |
          mkdir -p release-build/client release-build/server/dist/server/src release-build/server/node_modules

          # Plugin entry — strip TypeScript type annotations
          npx -y esbuild plugin/index.ts \
            --bundle=false \
            --format=esm \
            --platform=node \
            --outfile=release-build/index.js

          # Plugin package.json
          cp plugin/package.json release-build/package.json

          # TUI plugin (kept as-is, tsx processed by OpenCode's bundler)
          cp plugin/tui.tsx release-build/tui.tsx

          # Built client
          cp -r client/dist release-build/client/dist

          # Built server (esbuild bundle)
          cp server/dist/bundle/index.js release-build/server/dist/server/src/index.js

          # Server is CommonJS — prevent plugin's "type":"module" from poisoning it
          echo '{"type":"commonjs"}' > release-build/server/package.json

          # sql.js (external dep — needs wasm at runtime)
          cp -r server/node_modules/sql.js release-build/server/node_modules/sql.js

      # ── Publish to npm ────────────────────────────────────────
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd release-build
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          npm publish --access public

      # ── Tag version ────────────────────────────────────────────
      - name: Create version tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v$(node -p "require('./package.json').version")"

          # Only create tag + release if it doesn't already exist on remote
          if git ls-remote --tags origin "$VERSION" | grep -q "$VERSION"; then
            echo "Tag $VERSION already exists — skipping"
          else
            echo "Creating tag $VERSION"
            git tag "$VERSION"
            git push origin "$VERSION"

            echo "Creating GitHub Release $VERSION"
            gh release create "$VERSION" \
              --title "$VERSION" \
              --generate-notes \
              --latest
          fi
